version: '3.8'

services:
  opencode-memory-plugin-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencode-memory-plugin:test
    container_name: opencode-memory-plugin-test
    volumes:
      # Mount test results to host
      - ./test-results:/usr/src/app/test-results
      # Mount memory directory for persistence (optional)
      - test-memory:/root/.opencode/memory
    environment:
      - NODE_ENV=testing
      - PLUGIN_VERSION=1.1.0
    working_dir: /usr/src/app
    command: /bin/bash /usr/src/app/run-all-tests.sh

  # Interactive shell for manual testing
  opencode-memory-plugin-shell:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencode-memory-plugin:test
    container_name: opencode-memory-plugin-shell
    volumes:
      - test-memory:/root/.opencode/memory
    environment:
      - NODE_ENV=development
    working_dir: /usr/src/app
    command: /bin/bash
    stdin_open: true
    tty: true

volumes:
  test-memory:
    driver: local
